name: Nightly Release APKs with Incremental Changelog

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Fullperm Debug APKs
      # Using debug to bypass the missing release keystore error
      run: ./gradlew assembleFullpermDebug

    - name: Rename APKs to include app name and EST timestamp
      run: |
        mkdir -p renamed_apks
        TIMESTAMP=$(TZ="America/New_York" date +'%m%d%Y-%I%M')
        # Path updated to fullperm/debug
        find app/build/outputs/apk/fullperm/debug/ -name "*.apk" -exec cp {} "renamed_apks/Orbot-fullperm-debug-$TIMESTAMP.apk" \;

    - name: Generate incremental changelog
      id: changelog
      run: |
        # Safely find the previous tag
        LAST_TAG=$(git tag --list 'nightly-v*' --sort=-creatordate | sed -n '2p')
        
        echo "CHANGELOG_STATE<<EOF" >> $GITHUB_ENV
        if [ -z "$LAST_TAG" ]; then
          git log -50 --pretty=format:"- %s" >> $GITHUB_ENV
        else
          git log $LAST_TAG..HEAD --pretty=format:"- %s" >> $GITHUB_ENV
        fi
        echo "" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Create GitHub Release and upload APKs
      uses: softprops/action-gh-release@v2
      with:
        tag_name: nightly-v${{ github.run_number }}
        name: Nightly Release #${{ github.run_number }}
        body: ${{ env.CHANGELOG_STATE }}
        files: renamed_apks/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
