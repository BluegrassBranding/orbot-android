name: Nightly Release APKs with Incremental Changelog

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Nightly Release APKs
      run: ./gradlew assembleNightlyRelease

    - name: List generated APKs
      run: find . -type f -name "*nightly*release*.apk"

    - name: Rename APKs to include app name and EST timestamp
      run: |
        mkdir -p renamed_apks
        TIMESTAMP=$(TZ="America/New_York" date +'%m%d%Y-%I%M')
        for f in app/build/outputs/apk/nightly/release/*universal*.apk; do
          cp "$f" "renamed_apks/Orbot-nightly-universal-$TIMESTAMP.apk"
        done
        for f in app/build/outputs/apk/nightly/release/*arm64-v8a*.apk; do
          cp "$f" "renamed_apks/Orbot-nightly-arm64-v8a-$TIMESTAMP.apk"
        done

    - name: Generate incremental changelog
      id: changelog
      run: |
        # Find previous nightly tag (exclude current run)
        LAST_TAG=$(git tag --list 'nightly-v*' --sort=-creatordate | sed -n '2p')
        if [ -z "$LAST_TAG" ]; then
          # No previous tag → use last 50 commits as fallback
          git log -50 --pretty=format:"- %s" > changelog.txt
        else
          # Generate log since previous nightly release
          git log $LAST_TAG..HEAD --pretty=format:"- %s" > changelog.txt
        fi
        # Output for GitHub Release
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        cat changelog.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create GitHub Release and upload APKs
      uses: softprops/action-gh-release@v2
      with:
        tag_name: nightly-v${{ github.run_number }}
        name: Nightly Release #${{ github.run_number }}
        body: ${{ steps.changelog.outputs.CHANGELOG }}
        files: renamed_apks/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
